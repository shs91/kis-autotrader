services:
  db:
    # pgvector extension 포함된 PG16 이미지. alpine 미지원이라 debian-bookworm 사용.
    # pgdata volume은 PG16 호환이므로 in-place 교체 가능 (덤프/복구 불필요).
    # 적용: docker compose up -d --force-recreate db
    # 활성화: psql ... -c "CREATE EXTENSION IF NOT EXISTS vector;"  (또는 Alembic이 처리)
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kis_trader}
      POSTGRES_USER: ${POSTGRES_USER:-kis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-5432}:5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kis_trader}
      REDIS_URL: redis://redis:6379/0
      TZ: Asia/Seoul
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json
      - ./holidays.json:/app/holidays.json:ro
    ports:
      - "${HEALTH_PORT:-18923}:18923"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kis_trader}
      TZ: Asia/Seoul
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
